# fly.toml — generated for social_scraper backend
# Replace <YOUR-APP-NAME> with the name you choose during `fly launch`

app = "<YOUR-APP-NAME>"
primary_region = "sin"   # Singapore — closest free-tier region for India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0      # scale to zero when idle (free tier)

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source      = "social_scraper_data"
  destination = "/data"
